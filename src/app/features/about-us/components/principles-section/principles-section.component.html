<section class="py-16 sm:py-20">
	<div class="mx-auto w-full max-w-6xl px-6 sm:px-10">
		<header class="mb-16 text-center">
			<h2 class="text-balance text-3xl font-semibold leading-tight text-primary sm:text-4xl">
				{{ title }}
			</h2>
			<p class="mt-3 text-base leading-relaxed text-primary-400 sm:text-lg">{{ subtitle }}</p>
		</header>

		<div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
			@for (principle of principles; track $index) {
				<p-card
					class="h-full border border-surface-200 shadow-none"
					[pt]="{ body: { class: 'h-full p-6 sm:p-8' } }"
				>
					<div class="flex h-full flex-col gap-4">
						<span
							class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-primary-50 text-primary-500"
						>
							<i [class]="principle.icon + ' principles-icon'" aria-hidden="true"></i>
						</span>
						<h3 class="text-xl font-semibold leading-tight text-primary">{{ principle.title }}</h3>
						<p class="text-base leading-relaxed text-primary-400">{{ principle.description }}</p>
					</div>
				</p-card>
			}
		</div>
	</div>
</section>
