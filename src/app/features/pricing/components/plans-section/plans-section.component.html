<section class="py-16 sm:py-20">
	<div class="mx-auto w-full max-w-6xl px-6 sm:px-10">
		<header class="mx-auto text-center">
			<h2 class="text-balance text-3xl font-extrabold leading-tight text-primary sm:text-6xl">
				{{ title }}
			</h2>
			<p class="mx-auto mt-6 max-w-4xl text-base leading-relaxed text-primary-400 sm:text-xl">
				{{ subtitle }}
			</p>
		</header>

		<div class="mt-24 flex flex-col items-center gap-4">
			<div
				class="plans-billing-glider"
				[class.is-monthly]="selectedBillingCycle === 'monthly'"
				[class.is-semiannually]="selectedBillingCycle === 'semiAnnually'"
				[class.is-annually]="selectedBillingCycle === 'annually'"
			>
				<p-selectbutton
					[options]="billingCycles"
					[(ngModel)]="selectedBillingCycle"
					optionLabel="label"
					optionValue="value"
					[allowEmpty]="false"
				/>
			</div>
			<!-- <span
				class="rounded-full bg-indigo-100 px-4 py-1 text-xs font-semibold uppercase tracking-wide text-indigo-700"
			>
				Save 20% on annual
			</span> -->
		</div>

		<div class="mt-10 grid gap-6 lg:grid-cols-3">
			@for (plan of plans; track plan.name) {
				<p-card
					class="h-full border border-surface-200 shadow-none"
					[pt]="{ body: { class: 'h-full p-6 sm:p-7' } }"
				>
					<article class="relative flex h-full flex-col">
						@if (plan.featured) {
							<span class="plans-featured-badge">Most Popular</span>
						}

						<div class="space-y-2">
							<h2 class="text-3xl font-semibold text-primary">{{ plan.name }}</h2>
							<p class="text-base leading-relaxed text-primary-400">{{ plan.description }}</p>
						</div>

						<div class="mt-7 flex items-end gap-1">
							<p class="text-6xl font-semibold leading-none text-primary">{{ plan.price }}</p>
							@if (!plan.customPricing) {
								<span class="pb-1 text-base font-medium text-primary-300">/mo</span>
							}
						</div>

						<div class="mt-7 border-t border-surface-200 pt-6">
							<p-button
								[label]="plan.ctaLabel"
								[size]="'large'"
								[rounded]="false"
								[raised]="true"
								styleClass="w-full !bg-primary !border-primary hover:!bg-primary-700"
							/>
						</div>

						<ul class="mt-6 space-y-3">
							@for (benefit of plan.benefits; track benefit) {
								<li class="flex items-center gap-3 text-base text-primary-400">
									<i class="pi pi-check-circle text-emerald-500" aria-hidden="true"></i>
									<span>{{ benefit }}</span>
								</li>
							}
						</ul>
					</article>
				</p-card>
			}
		</div>
	</div>
</section>
