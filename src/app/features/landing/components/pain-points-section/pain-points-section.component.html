<section class="bg-surface-100 py-16 sm:py-20">
	<div class="mx-auto w-full max-w-6xl px-6 sm:px-10">
		<header class="mx-auto max-w-4xl text-center">
			<h2 class="text-balance text-3xl font-semibold leading-tight sm:text-4xl text-primary">
				{{ title }}
			</h2>
			<p class="mt-4 text-base leading-relaxed text-primary-400 sm:text-lg">
				{{ description }}
			</p>
		</header>

		<div class="mt-10 grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
			@for (point of painPoints; track $index) {
				<p-card
					class="h-full border border-surface-200 shadow-none"
					[pt]="{ body: { class: 'h-full p-6' } }"
				>
					<div class="flex h-full flex-col gap-3">
						<span class="inline-flex h-10 w-10 items-center justify-start rounded-md">
							<i [class]="point.icon + ' pain-points-icon'"></i>
						</span>
						<h3 class="text-xl font-semibold leading-tight">
							{{ point.title }}
						</h3>
						<p class="text-base leading-relaxed text-muted-color">{{ point.description }}</p>
					</div>
				</p-card>
			}
		</div>
	</div>
</section>
