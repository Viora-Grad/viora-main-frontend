<section class="bg-surface-100 py-16 sm:py-20">
	<div class="mx-auto w-full max-w-7xl px-6 sm:px-10">
		<div class="space-y-10 py-2 sm:py-4">
			<header class="mx-auto max-w-4xl text-center">
				<h2 class="text-balance text-3xl font-semibold leading-tight text-primary sm:text-4xl">
					{{ title }}
				</h2>
			</header>

			<div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-4 lg:gap-10">
				@for (item of items; track $index) {
					<article class="space-y-4 text-center">
						<p-avatar [icon]="item.icon" shape="circle" size="xlarge" [class]="item.badgeClass" />
						<h3 class="text-xl font-semibold leading-tight text-primary">
							{{ item.title }}
						</h3>
						<p class="text-base leading-relaxed text-muted-color">
							{{ item.description }}
						</p>
					</article>
				}
			</div>
		</div>
	</div>
</section>
