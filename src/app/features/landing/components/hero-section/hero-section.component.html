<section class="hero-shell relative isolate h-full w-full overflow-hidden bg-surface-900">
	<div class="hero-background pointer-events-none absolute inset-0">
		<div
			class="absolute inset-0 bg-linear-to-r from-surface-950 via-surface-950/90 to-surface-950/30"
		></div>
		<div class="hero-video-frame absolute inset-y-0 right-0 w-[72%] sm:w-[68%]">
			<video
				#heroVideo
				class="hero-video h-full w-full object-cover"
				autoplay
				muted
				loop
				playsinline
				preload="auto"
				aria-hidden="true"
			>
				<source [src]="videoSrc()" type="video/mp4" />
			</video>
		</div>
		<div
			class="absolute inset-0 bg-linear-to-t from-surface-950/85 via-transparent to-transparent"
		></div>
	</div>

	<div
		class="relative z-10 grid h-full min-h-screen grid-cols-1 items-center gap-8 px-6 py-10 sm:px-10 lg:grid-cols-5 lg:px-12"
	>
		<div class="space-y-6 lg:col-span-2">
			<div class="flex flex-wrap items-center gap-3">
				<p-message severity="info" variant="outlined" styleClass="w-fit">{{ info() }}</p-message>
			</div>
			<h1
				class="text-balance text-3xl font-semibold leading-tight text-surface-0 sm:text-4xl lg:text-5xl"
			>
				{{ title() }}
			</h1>
			<p class="max-w-xl text-base leading-relaxed text-surface-200 sm:text-lg">
				{{ description() }}
			</p>
			<div class="flex flex-wrap items-center gap-3">
				<p-button
					[label]="ctaLabel()"
					icon="pi pi-arrow-right"
					iconPos="right"
					size="large"
					[rounded]="true"
					[raised]="true"
					styleClass="!bg-surface-0 !border-surface-0 !text-primary-700 hover:!bg-surface-100"
				/>
				<p-button
					[label]="secondaryCtaLabel()"
					size="large"
					variant="outlined"
					[rounded]="true"
					styleClass="!border-surface-0 !text-surface-0 hover:!bg-surface-0/10"
				/>
			</div>
		</div>
		<div class="hidden lg:col-span-3 lg:block"></div>
	</div>
</section>
